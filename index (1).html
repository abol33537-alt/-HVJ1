<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابوالفضل عبداللهی | کارت ویزیت دیجیتال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f1115;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 198, 255, 0.08) 0%, transparent 70%);
            top: -50px;
            right: -50px;
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(114, 9, 183, 0.05) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            z-index: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 35px 25px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4),
                        0 0 80px rgba(0, 198, 255, 0.02);
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 198, 255, 0.2);
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.5),
                        0 0 100px rgba(0, 198, 255, 0.05);
        }

        .profile-wrapper {
            position: relative;
            width: 125px;
            height: 125px;
            margin: 0 auto 24px;
        }

        .profile-wrapper::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            z-index: -1;
            opacity: 0.7;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #13161c;
            background: #13161c;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 0.88rem;
            color: #8a99ad;
            margin-bottom: 35px;
            font-weight: 400;
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-telegram {
            background: rgba(41, 167, 229, 0.08);
            color: #3ab1f0;
            border: 1px solid rgba(41, 167, 229, 0.15);
        }
        .btn-telegram:hover {
            background: #29a7e5;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(41, 167, 229, 0.3);
        }

        .btn-bale {
            background: rgba(18, 179, 137, 0.08);
            color: #1bc499;
            border: 1px solid rgba(18, 179, 137, 0.15);
        }
        .btn-bale:hover {
            background: #12b389;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(18, 179, 137, 0.3);
        }

        .btn-call {
            background: rgba(0, 198, 255, 0.08);
            color: #00c6ff;
            border: 1px solid rgba(0, 198, 255, 0.15);
        }
        .btn-call:hover {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.3);
        }

        .btn-sms {
            background: rgba(255, 255, 255, 0.03);
            color: #d1d5db;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-sms:hover {
            background: #ffffff;
            color: #0f1115;
        }

        .icon-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-main {
            font-size: 1.25rem;
        }

        .arrow-indicator {
            font-size: 0.8rem;
            opacity: 0.6;
            transition: transform 0.3s ease;
        }

        .link-item:hover .arrow-indicator {
            transform: translateX(-4px);
            opacity: 1;
        }
    </style>
</head>
